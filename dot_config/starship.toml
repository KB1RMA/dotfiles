"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000

# Material Theme Default palette
palette = "material"

[palettes.material]
red = "#f07178"
orange = "#F78C6C"
yellow = "#FFCB6B"
green = "#C3E88D"
cyan = "#89DDFF"
blue = "#82AAFF"
purple = "#C792EA"
pink = "#ff9cac"
white = "#EEFFFF"
dimmed = "#546E7A"
teal = "#80CBC4"

[aws]
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'

[azure]
format = '\[[$symbol($subscription)]($style)\]'

[battery]
format = '\[[$symbol$percentage]($style)\]'

[buf]
format = '\[[$symbol($version)]($style)\]'

[bun]
format = '\[[$symbol($version)]($style)\]'

[c]
format = '\[[$symbol($version(-$name))]($style)\]'

[cmake]
format = '\[[$symbol($version)]($style)\]'

[character]
success_symbol = '[❯](teal)'
error_symbol = '[❯](red)'

[cmd_duration]
format = '\[[⏱ $duration]($style)\]'
style = 'yellow'

[cobol]
format = '\[[$symbol($version)]($style)\]'

[conda]
format = '\[[$symbol$environment]($style)\]'

[container]
format = '\[[$symbol \[$name\]]($style)\]'

[cpp]
format = '\[[$symbol($version(-$name))]($style)\]'

[crystal]
format = '\[[$symbol($version)]($style)\]'

[daml]
format = '\[[$symbol($version)]($style)\]'

[dart]
format = '\[[$symbol($version)]($style)\]'

[deno]
format = '\[[$symbol($version)]($style)\]'

[direnv]
